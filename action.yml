name: SessionTrail
description: Runtime behavior review for AI agent sessions.
author: Conal

branding:
  icon: pulse
  color: purple

inputs:
  transcript:
    description: Path to a Cursor, Claude Code, or Codex transcript JSONL file.
    required: false
    default: ''
  transcript-dir:
    description: Directory containing transcript JSONL files. Used when transcript is not provided.
    required: false
    default: ''
  repo:
    description: Repository root used to judge in-repo vs out-of-repo behavior. Defaults to GITHUB_WORKSPACE.
    required: false
    default: ''
  config:
    description: Path to a SessionTrail allowlist JSON file. Defaults to <repo>/.sessiontrail.json. Use this when the audit repo root isn't where the config lives (e.g. monorepo subdirectory audits).
    required: false
    default: ''
  fail-on:
    description: Severity that fails the action. Use none, low, medium, high, or critical.
    required: false
    default: none

outputs:
  rating:
    description: Highest SessionTrail behavior rating.
    value: ${{ steps.run.outputs.rating }}
  finding-count:
    description: Total SessionTrail findings in the session review.
    value: ${{ steps.run.outputs.finding-count }}
  tool-invocation-count:
    description: Total tool invocations parsed from the transcript.
    value: ${{ steps.run.outputs.tool-invocation-count }}
  unique-tool-count:
    description: Number of unique tools invoked in the session.
    value: ${{ steps.run.outputs.unique-tool-count }}
  runtime-count:
    description: Number of agent runtimes represented in the reviewed transcripts.
    value: ${{ steps.run.outputs.runtime-count }}
  sarif-file:
    description: Filesystem path of the SARIF 2.1.0 report (uploadable via github/codeql-action/upload-sarif).
    value: ${{ steps.run.outputs.sarif-file }}

runs:
  using: composite
  steps:
    - name: Run SessionTrail behavior review
      id: run
      shell: bash
      env:
        TRAIL_TRANSCRIPT: ${{ inputs.transcript }}
        TRAIL_TRANSCRIPT_DIR: ${{ inputs.transcript-dir }}
        TRAIL_REPO: ${{ inputs.repo }}
        TRAIL_CONFIG: ${{ inputs.config }}
        TRAIL_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        set -euo pipefail

        transcript="${TRAIL_TRANSCRIPT:-}"
        transcript_dir="${TRAIL_TRANSCRIPT_DIR:-}"
        repo="${TRAIL_REPO:-$GITHUB_WORKSPACE}"
        config="${TRAIL_CONFIG:-}"
        fail_on="${TRAIL_FAIL_ON:-none}"

        # Forward --config when provided. Empty input keeps the CLI's
        # default <repo>/.sessiontrail.json lookup; explicit input
        # points at whatever the user passed (useful in monorepos).
        config_arg=()
        if [ -n "$config" ]; then
          config_arg=(--config "$config")
        fi

        if [ -z "$transcript" ] && [ -z "$transcript_dir" ]; then
          echo "::error::SessionTrail needs transcript or transcript-dir input."
          exit 2
        fi

        report_file="${RUNNER_TEMP:-.}/sessiontrail-report.md"
        json_file="${RUNNER_TEMP:-.}/sessiontrail-report.json"
        sarif_file="${RUNNER_TEMP:-.}/sessiontrail-report.sarif"

        # One audit pass emits GitHub annotations to stdout and the JSON,
        # Markdown, and SARIF reports straight to files. Threshold-driven
        # exit codes come from the CLI via --fail-on (same severity ranks
        # as the action input), so the bash never has to know about them.
        # `|| audit_exit=$?` lets us inspect the exit code without
        # tripping `set -e` — we still emit outputs before failing.
        audit_exit=0
        if [ -n "$transcript" ]; then
          node "$GITHUB_ACTION_PATH/bundle/index.js" audit \
            --transcript "$transcript" --repo "$repo" \
            --format github \
            --json-out "$json_file" \
            --markdown-out "$report_file" \
            --sarif-out "$sarif_file" \
            "${config_arg[@]}" \
            --fail-on "$fail_on" || audit_exit=$?
        else
          node "$GITHUB_ACTION_PATH/bundle/index.js" audit \
            --transcript-dir "$transcript_dir" --repo "$repo" \
            --format github \
            --json-out "$json_file" \
            --markdown-out "$report_file" \
            --sarif-out "$sarif_file" \
            "${config_arg[@]}" \
            --fail-on "$fail_on" || audit_exit=$?
        fi

        cat "$report_file"

        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          cat "$report_file" >> "$GITHUB_STEP_SUMMARY"
        fi

        # jq is pre-installed on GitHub-hosted runners; one short invocation
        # per scalar beats spawning node five times.
        rating="$(jq -r '.rating' "$json_file")"
        finding_count="$(jq -r '.findingCount' "$json_file")"
        tool_invocation_count="$(jq -r '.toolInvocationCount' "$json_file")"
        unique_tool_count="$(jq -r '.uniqueToolCount' "$json_file")"
        runtime_count="$(jq -r '[(.runtimeUsage // {}) | to_entries[] | select(.value > 0)] | length' "$json_file")"
        echo "rating=$rating" >> "$GITHUB_OUTPUT"
        echo "finding-count=$finding_count" >> "$GITHUB_OUTPUT"
        echo "tool-invocation-count=$tool_invocation_count" >> "$GITHUB_OUTPUT"
        echo "unique-tool-count=$unique_tool_count" >> "$GITHUB_OUTPUT"
        echo "runtime-count=$runtime_count" >> "$GITHUB_OUTPUT"
        echo "sarif-file=$sarif_file" >> "$GITHUB_OUTPUT"

        # Propagate the CLI's threshold decision. Bash rank() table is
        # gone — passesSeverityThreshold in core is the single source of
        # truth and is exercised by both local --fail-on runs and CI.
        if [ "$audit_exit" -ne 0 ]; then
          echo "::error::SessionTrail behavior rating $rating meets fail-on threshold $fail_on."
          exit "$audit_exit"
        fi
