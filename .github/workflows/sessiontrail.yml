name: SessionTrail

on:
  pull_request:

permissions:
  contents: read
  # upload-sarif needs this to push results to Code Scanning. Without
  # it the upload step fails — exactly the kind of permissions
  # regression we want CI to catch.
  security-events: write

jobs:
  behavior-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./
        with:
          transcript-dir: test/fixtures
          repo: .
          fail-on: none

      # Dogfood detection quality, not just "the action runs". The
      # rogue-session fixture is engineered to trip critical findings;
      # if we run it through the action and get back anything less than
      # critical, something regressed in the detection pipeline.
      - name: Audit only the rogue fixture
        id: rogue
        uses: ./
        with:
          transcript: test/fixtures/rogue-session.jsonl
          repo: .
          fail-on: none

      - name: Assert rogue session reads as critical
        shell: bash
        env:
          ROGUE_RATING: ${{ steps.rogue.outputs.rating }}
          ROGUE_FINDINGS: ${{ steps.rogue.outputs.finding-count }}
        run: |
          set -euo pipefail
          if [ "$ROGUE_RATING" != "critical" ]; then
            echo "::error::rogue-session.jsonl rated $ROGUE_RATING; expected critical"
            exit 1
          fi
          if [ "$ROGUE_FINDINGS" -lt 6 ]; then
            echo "::error::rogue-session.jsonl produced $ROGUE_FINDINGS findings; expected >= 6"
            exit 1
          fi
          echo "rogue session correctly classified critical with $ROGUE_FINDINGS findings"

      # Push the rogue-session SARIF to Code Scanning. Dogfooding the
      # upload path catches schema regressions that unit tests can't —
      # if the SARIF we emit ever stops parsing under GitHub's stricter
      # validator, this step will fail in CI.
      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.rogue.outputs.sarif-file }}
          category: sessiontrail-rogue-fixture
