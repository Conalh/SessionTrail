name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Fast typecheck gate before the full build. tsc --noEmit catches
      # type regressions in seconds; if this fails, no point building or
      # testing. Redundant with `build` in the success case but the
      # failure shape is clearer (typecheck errors vs build artifacts).
      - run: npm run typecheck

      - run: npm run build

      - run: npm test

      - name: Verify action bundle is up to date (run `npm run bundle` and commit if this fails)
        run: |
          npm run bundle
          git diff --exit-code -- bundle
