name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Verify action bundle is up to date (run `npm run bundle` and commit if this fails)
        run: |
          npm run bundle
          git diff --exit-code -- bundle
